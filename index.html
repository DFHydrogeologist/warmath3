// Compute adjacency based on distance between centers
const ADJ_FACTOR=2.1; // two hexes adjacent if dist < (r1+r2)*factor
COMUNAS.forEach(c=>{
  c.adj=COMUNAS.filter(o=>o.id!==c.id&&Math.hypot(c.x-o.x,c.y-o.y)<(c.r+o.r)*ADJ_FACTOR).map(o=>o.id);
});

function getAdj(id){return COMUNAS.find(c=>c.id===id)?.adj||[];}
function getCom(id){return COMUNAS.find(c=>c.id===id);}

/* ═══════════════════════════════════════════════════
   ZONE 4: COMBAT SYSTEM
   ═══════════════════════════════════════════════════ */
function combat(attackers,defenders){
  const total=attackers+defenders;
  const baseChance=attackers/total;
  const luck=(Math.random()-0.5)*0.3;
  const winChance=Math.max(0.05,Math.min(0.95,baseChance+luck));
  const attackerWins=Math.random()<winChance;

  let aLoss,dLoss;
  if(attackerWins){
    aLoss=Math.ceil(defenders*(0.05+Math.random()*0.10));
    dLoss=Math.ceil(defenders*(0.20+Math.random()*0.20));
  }else{
    dLoss=Math.ceil(attackers*(0.05+Math.random()*0.10));
    aLoss=Math.ceil(attackers*(0.20+Math.random()*0.20));
  }

  let newA=Math.max(0,attackers-aLoss);
  let newD=Math.max(0,defenders-dLoss);
  if(newA>0&&newA<DEATH_THRESHOLD){aLoss=attackers;newA=0;}
  if(newD>0&&newD<DEATH_THRESHOLD){dLoss=defenders;newD=0;}

  return{
    attackerWins,
    newAttacker:newA,newDefender:newD,
    attackerLoss:attackers-newA,defenderLoss:defenders-newD,
    conquered:attackerWins&&newD===0
  };
}

/* Bot turn simulation — pure function, no DB writes */
function simulateBotTurn(terr){
  const next={};
  Object.entries(terr).forEach(([id,t])=>{next[id]={...t};});
  const events=[];

  // All NPC comunas gain +1 soldier
  Object.entries(next).forEach(([id,t])=>{if(t.owner==='npc')t.garrison+=1;});

  // 2-5 random attacks
  const numAttacks=2+Math.floor(Math.random()*4);
  for(let i=0;i<numAttacks;i++){
    const botComunas=Object.entries(next).filter(([,t])=>t.owner==='npc'&&t.garrison>20);
    if(botComunas.length===0)break;
    const[aId,attacker]=botComunas[Math.floor(Math.random()*botComunas.length)];
    const adj=getAdj(aId);
    const enemies=adj.filter(id=>next[id]&&id!==aId);
    if(enemies.length===0)continue;
    const tId=enemies[Math.floor(Math.random()*enemies.length)];
    const defender=next[tId];
    const r=combat(attacker.garrison,defender.garrison);
    next[aId].garrison=r.newAttacker;
    next[tId].garrison=r.newDefender;
    const cName=getCom(tId)?.name||tId;
    if(r.conquered){
      next[tId].owner='npc';
      const move=Math.ceil(r.newAttacker*0.25);
      next[tId].garrison=move;
      next[aId].garrison-=move;
      events.push(`⚠️ ¡Bot conquistó ${cName}!`);
    }else if(r.attackerWins){
      events.push(`🤖 Bot atacó ${cName} (-${r.defenderLoss})`);
    }else{
      events.push(`🛡️ ${cName} resistió ataque bot`);
    }
  }
  return{terr:next,events};
}

async function syncWorldState(terr){
  const updates=Object.entries(terr).map(([id,t])=>({
    comuna_id:id,
    owner_type:t.owner==='npc'?'npc':'player',
    owner_id:t.owner==='npc'?null:t.owner,
    garrison:t.garrison
  }));
  for(const u of updates){
    await sb.from('territories').update({owner_type:u.owner_type,owner_id:u.owner_id,garrison:u.garrison}).eq('comuna_id',u.comuna_id);
  }
}

/* ═══════════════════════════════════════════════════
   ZONE 7: HEXAGON RENDERER
   ═══════════════════════════════════════════════════ */
function hexPoints(cx,cy,r){
  return Array.from({length:6},(_,i)=>{
    const a=Math.PI/3*i-Math.PI/6;
    return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  }).join(' ');
}

function HexMap({territories,myId,allPlayers,selected,onSelect}){
  const getColor=(t)=>{
    if(!t||t.owner==='npc')return NPC_COLOR;
    if(t.owner===myId)return C.gold;
    const idx=allPlayers.findIndex(p=>p.id===t.owner);
    return PLAYER_COLORS[idx%PLAYER_COLORS.length];
  };
  const myAdj=new Set();
  Object.entries(territories).forEach(([id,t])=>{
    if(t.owner===myId)getAdj(id).forEach(a=>{if(territories[a]?.owner!==myId)myAdj.add(a);});
  });

  return(
    <svg viewBox="0 0 580 520" style={{width:'100%',maxWidth:600,margin:'0 auto',display:'block'}}>
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      {/* Adjacency lines */}
      {COMUNAS.map(c=>c.adj.map(aId=>{
        const o=getCom(aId);if(!o||c.id>aId)return null;
        return <line key={`${c.id}-${aId}`} x1={c.x} y1={c.y} x2={o.x} y2={o.y} stroke="rgba(255,255,255,0.06)" strokeWidth={1}/>;
      }))}
      {/* Hexagons */}
      {COMUNAS.map(c=>{
        const t=territories[c.id];
        const color=getColor(t);
        const isMine=t?.owner===myId;
        const isAdj=myAdj.has(c.id);
        const isSel=selected===c.id;
        return(
          <g key={c.id} onClick={()=>onSelect(c.id)} style={{cursor:'pointer'}}>
            <polygon
              points={hexPoints(c.x,c.y,c.r)}
              fill={color+(isMine?'33':'22')}
              stroke={isSel?'#fff':isAdj?'#ef4444':color}
              strokeWidth={isSel?2.5:isAdj?1.5:1}
              filter={isMine?'url(#glow)':'none'}
            />
            <text x={c.x} y={c.y-5} textAnchor="middle" fill={isMine?C.gold:'#fff'} fontSize={c.r>30?8:7} fontFamily="'Cinzel',serif" fontWeight={700}>{c.name}</text>
            <text x={c.x} y={c.y+9} textAnchor="middle" fill={isMine?C.gold:'rgba(255,255,255,0.7)'} fontSize={9} fontFamily="'Crimson Text',serif">
              {t?`⚔${t.garrison}`:'?'}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function AuthApp(){
  const[user,setUser]=useState(null);
  const[dbPlayer,setDbPlayer]=useState(null);
  const[authReady,setAuthReady]=useState(false);
  const[authError,setAuthError]=useState(null);

  useEffect(()=>{
    try{const s=localStorage.getItem("wm2_guser");if(s){const u=JSON.parse(s);if(u?.sub)setUser(u);}}catch{}
    setAuthReady(true);
  },[]);

  useEffect(()=>{
    if(!user||user.sub==='guest')return;
    upsertPlayer(user).then(p=>{if(p)setDbPlayer(p);});
  },[user]);

  useEffect(()=>{
    if(typeof google==='undefined'){
      const iv=setInterval(()=>{if(typeof google!=='undefined'){clearInterval(iv);initGSI();}},200);
      const t=setTimeout(()=>{clearInterval(iv);setAuthReady(true);},5000);
      return()=>{clearInterval(iv);clearTimeout(t);};
    }else initGSI();
    function initGSI(){
      try{
        google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:r=>{
          const p=decodeJwt(r.credential);
          if(p){const u={sub:p.sub,name:p.name||"Jugador",email:p.email||"",picture:p.picture||""};setUser(u);setAuthError(null);try{localStorage.setItem("wm2_guser",JSON.stringify(u));}catch{}}
        },auto_select:true});
        setAuthReady(true);
      }catch{setAuthError("Error GSI");setAuthReady(true);}
    }
  },[]);

  const handleGoogleLogin=useCallback(()=>{
    if(typeof google!=='undefined')try{google.accounts.id.prompt(n=>{if(n.isNotDisplayed()||n.isSkippedMoment())setAuthError("popup_blocked");});}catch{setAuthError("Error GSI");}
  },[]);
  const handleLogout=useCallback(()=>{setUser(null);setDbPlayer(null);try{localStorage.removeItem("wm2_guser");}catch{};if(typeof google!=='undefined')try{google.accounts.id.disableAutoSelect();}catch{}},[]);
  const handleGuest=useCallback(()=>{const g={sub:"guest",name:"Invitado",email:"",picture:""};setUser(g);try{localStorage.setItem("wm2_guser",JSON.stringify(g));}catch{}},[]);

  if(!authReady)return <LoadingScreen msg="Cargando..."/>;
  if(!user)return <LoginScreen onGoogle={handleGoogleLogin} onGuest={handleGuest} authError={authError}/>;
  return <App user={user} dbPlayer={dbPlayer} onLogout={handleLogout}/>;
}

      <div style={{fontSize:42,marginBottom:8}}>⚔️</div>
      <h1 style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:28,fontWeight:900,marginBottom:4}}>War Math</h1>
      <p style={{color:C.dim,fontFamily:"'Crimson Text',serif",fontSize:14,marginBottom:30}}>Conquista Santiago</p>
      <button onClick={onGoogle} style={{background:'#fff',borderRadius:12,padding:'14px 28px',fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:14,color:'#333',marginBottom:12,minWidth:220}}>
        🔐 Entrar con Google

      <button onClick={onGuest} style={{background:'transparent',border:'1px solid rgba(255,255,255,0.15)',borderRadius:12,padding:'12px 28px',fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:13,color:C.dim,minWidth:220}}>
        Entrar como Invitado
      </button>
      {authError&&<p style={{color:C.lose,fontSize:12,marginTop:12}}>Error: {authError}</p>}
    </div>
  );
}

}

   ZONE 9: MAIN GAME APP
   ═══════════════════════════════════════════════════ */
function App({user,dbPlayer,onLogout}){
  const myId=dbPlayer?.id||null;
  const isGuest=user.sub==='guest';

  const[loading,setLoading]=useState(true);
  const[territories,setTerritories]=useState({});
  const[allPlayers,setAllPlayers]=useState([]);
  const[wins,setWins]=useState(0);
  const[losses,setLosses]=useState(0);
  const[prodRate,setProdRate]=useState(1);
  const[battleLog,setBattleLog]=useState([{text:"¡Conquista Santiago!",type:"info"}]);
  const[catchUpData,setCatchUpData]=useState(null);
  const[screen,setScreen]=useState("init");
  const[selectedComuna,setSelectedComuna]=useState(null);
  const[toast,setToast]=useState(null);
  const[lastVideoTime,setLastVideoTime]=useState(()=>{try{const t=localStorage.getItem("wm2_vid");return t?parseInt(t):0;}catch{return 0;}});
  const[videoTick,setVideoTick]=useState(0);

  // Battle state
  const[battleState,setBattleState]=useState(null); // {phase,lines,lineIdx,result,fromId,toId}
  const battleTimers=useRef([]);

  const terrRef=useRef(territories);
  useEffect(()=>{terrRef.current=territories;},[territories]);

  // Sync from dbPlayer
  useEffect(()=>{
    if(dbPlayer){
      setProdRate(dbPlayer.prod_rate||1);
      setWins(dbPlayer.wins||0);
      setLosses(dbPlayer.losses||0);
    }
  },[dbPlayer]);

  // Computed
  const myTerrs=useMemo(()=>Object.entries(territories).filter(([,t])=>t.owner===myId),[territories,myId]);
  const totalSoldiers=useMemo(()=>myTerrs.reduce((s,[,t])=>s+t.garrison,0),[myTerrs]);
  const rank=getRank(totalSoldiers);
  const hasStarted=myTerrs.length>0;
  const videoReady=Date.now()-lastVideoTime>=VIDEO_COOLDOWN_MS;
  const videoWaitSec=videoReady?0:Math.ceil((VIDEO_COOLDOWN_MS-(Date.now()-lastVideoTime))/1000);

  const showToast=(msg,duration=3000)=>{setToast(msg);setTimeout(()=>setToast(null),duration);};

  /* ═══ LOAD WORLD ═══ */
  useEffect(()=>{
    if(!myId&&!isGuest)return;
    let cancelled=false;
    async function init(){
      try{
        const world=await fetchWorld();
        if(cancelled)return;
        const state=buildState(world.territories);
        setTerritories(state);
        setAllPlayers(world.players);

        // Catch-up
        if(world.lastBotTurn){
          const elapsed=Date.now()-new Date(world.lastBotTurn).getTime();
          const missed=Math.min(MAX_CATCHUP,Math.floor(elapsed/TURN_MS));
          if(missed>0){
            const oldVal=world.lastBotTurn;
            const{data}=await sb.from('game_meta').update({value:new Date().toISOString()}).eq('key','last_bot_turn').eq('value',oldVal).select();
            if(data?.length>0){
              let cur=state;const evts=[];
              for(let i=0;i<missed;i++){const r=simulateBotTurn(cur);cur=r.terr;evts.push(...r.events);}
              // Passive income catch-up for player
              if(myId){
                const player=world.players.find(p=>p.id===myId);
                const pr=player?.prod_rate||1;
                const passiveMinutes=Math.floor(elapsed/PASSIVE_MS);
                Object.entries(cur).forEach(([id,t])=>{
                  if(t.owner===myId)cur[id].garrison+=passiveMinutes*pr;
                });
              }
              await syncWorldState(cur);
              if(!cancelled){setTerritories(cur);if(evts.length>0)setCatchUpData({turns:missed,events:evts});}
            }else{
              const fresh=await fetchWorld();
              if(!cancelled)setTerritories(buildState(fresh.territories));
            }
          }
        }
        if(!cancelled)setLoading(false);
      }catch(e){console.error('Init error:',e);if(!cancelled)setLoading(false);}
    }
    init();
    return()=>{cancelled=true;};
  },[myId,isGuest]);

  // Set screen when loaded
  useEffect(()=>{
    if(!loading&&screen==="init"){
      if(catchUpData)setScreen("catchUp");
      else if(hasStarted)setScreen("kingdom");
      else setScreen("pickHome");
    }
  },[loading,screen,catchUpData,hasStarted]);

  /* ═══ SAVE SYSTEM ═══ */
  const saveAll=useCallback(()=>{
    const cur=terrRef.current;
    if(!myId)return;
    Object.entries(cur).forEach(([id,t])=>{
      if(t.owner===myId){
        sb.from('territories').update({garrison:t.garrison,owner_type:'player',owner_id:myId}).eq('comuna_id',id);
      }
    });
  },[myId]);

  // Auto-save every 5 seconds
  useEffect(()=>{
    if(loading||!myId)return;
    const iv=setInterval(saveAll,SAVE_INTERVAL);
    return()=>clearInterval(iv);
  },[loading,myId,saveAll]);

  // Save on close/hide
  useEffect(()=>{
    if(!myId)return;
    const save=()=>{
      Object.entries(terrRef.current).forEach(([id,t])=>{
        if(t.owner===myId){
          fetch(`${SUPABASE_URL}/rest/v1/territories?comuna_id=eq.${id}`,{method:'PATCH',
            headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Prefer':'return=minimal'},
            body:JSON.stringify({garrison:t.garrison,owner_type:'player',owner_id:myId}),keepalive:true}).catch(()=>{});
        }
      });
    };
    const onVis=()=>{if(document.visibilityState==='hidden')save();};
    window.addEventListener('beforeunload',save);
    window.addEventListener('pagehide',save);
    document.addEventListener('visibilitychange',onVis);
    return()=>{window.removeEventListener('beforeunload',save);window.removeEventListener('pagehide',save);document.removeEventListener('visibilitychange',onVis);};
  },[myId]);

  /* ═══ PASSIVE INCOME ═══ */
  const prodRateRef=useRef(prodRate);
  useEffect(()=>{prodRateRef.current=prodRate;},[prodRate]);
  useEffect(()=>{
    if(loading)return;
    const iv=setInterval(()=>{
      const pr=prodRateRef.current;
      setTerritories(prev=>{
        let changed=false;const next={...prev};
        Object.entries(next).forEach(([id,t])=>{
          if(t.owner===myId){next[id]={...t,garrison:t.garrison+pr};changed=true;}
        });
        return changed?next:prev;
      });
    },PASSIVE_MS);
    return()=>clearInterval(iv);
  },[loading,myId]);

  /* ═══ AUTO BOT TURN ═══ */
  useEffect(()=>{
    if(loading)return;
    const iv=setInterval(async()=>{
      if(battleState?.phase==='narrating')return;
      const cur=terrRef.current;
      const r=simulateBotTurn(cur);
      setTerritories(r.terr);
      await syncWorldState(r.terr);
      await sb.from('game_meta').update({value:new Date().toISOString()}).eq('key','last_bot_turn');
      const playerEvts=r.events.filter(e=>e.startsWith("⚠️")||e.startsWith("🛡️"));
      const msg=playerEvts.length>0?playerEvts[0]:`⏩ Bots se movieron (${r.events.length} eventos)`;
      showToast(msg,4000);
      setBattleLog(l=>[{text:msg,type:playerEvts.some(e=>e.startsWith("⚠️"))?"lose":"info"},...l.slice(0,29)]);
    },AUTO_TURN_MS);
    return()=>clearInterval(iv);
  },[loading,battleState]);

  /* ═══ VIDEO COOLDOWN TICKER ═══ */
  useEffect(()=>{
    if(videoReady)return;
    const iv=setInterval(()=>setVideoTick(t=>t+1),1000);
    return()=>clearInterval(iv);
  },[videoReady]);

  /* ═══ WATCH VIDEO ═══ */
  const watchVideo=useCallback(async(comunaId)=>{
    if(!videoReady)return;
    const now=Date.now();
    setLastVideoTime(now);
    try{localStorage.setItem("wm2_vid",now.toString());}catch{}
    const{data}=await sb.from('territories').select('garrison').eq('comuna_id',comunaId).single();
    const newG=(data?.garrison||0)+VIDEO_BONUS;
    await sb.from('territories').update({garrison:newG}).eq('comuna_id',comunaId);
    setTerritories(prev=>({...prev,[comunaId]:{...prev[comunaId],garrison:newG}}));
    const cn=getCom(comunaId)?.name||"";
    showToast(`📺 +${VIDEO_BONUS} soldados en ${cn}`);
    setBattleLog(l=>[{text:`📺 ${cn}: +${VIDEO_BONUS} soldados`,type:"train"},...l.slice(0,29)]);
    setScreen("kingdom");
  },[videoReady]);

  /* ═══ UPGRADE PRODUCTION ═══ */
  const UPGRADE_COSTS=[0,100,200,300,400];
  const nextUpgradeCost=prodRate<5?UPGRADE_COSTS[prodRate]:null;
  const canUpgrade=nextUpgradeCost!==null&&totalSoldiers>=nextUpgradeCost;
  const[upgrading,setUpgrading]=useState(false);
  const upgradeProduction=useCallback(async()=>{
    if(!canUpgrade||upgrading||!myId)return;
    setUpgrading(true);
    try{
      const cost=nextUpgradeCost;
      const newRate=prodRate+1;
      await sb.from('players').update({prod_rate:newRate}).eq('id',myId);
      let remaining=cost;
      const cur=terrRef.current;
      for(const[id,t]of Object.entries(cur)){
        if(t.owner!==myId||remaining<=0)continue;
        const take=Math.min(remaining,t.garrison-1);
        if(take>0){
          remaining-=take;
          await sb.from('territories').update({garrison:t.garrison-take}).eq('comuna_id',id);
        }
      }
      const world=await fetchWorld();
      setTerritories(buildState(world.territories));
      setProdRate(newRate);
      showToast(`⬆️ Producción: ${newRate} cada 10 min`);
      setBattleLog(l=>[{text:`⬆️ Producción mejorada a ${newRate}/10min (−${cost})`,type:"train"},...l.slice(0,29)]);
    }catch(e){console.error(e);}
    setUpgrading(false);
  },[canUpgrade,upgrading,myId,prodRate,nextUpgradeCost]);

  /* ═══ MANUAL BOT TURN ═══ */
  const doManualBotTurn=useCallback(async()=>{
    const r=simulateBotTurn(terrRef.current);
    setTerritories(r.terr);
    await syncWorldState(r.terr);
    await sb.from('game_meta').update({value:new Date().toISOString()}).eq('key','last_bot_turn');
    showToast(`⏩ Turno bot: ${r.events.length} eventos`);
    setBattleLog(l=>[...r.events.map(e=>({text:e,type:e.startsWith("⚠️")?"lose":"info"})),...l].slice(0,30));
  },[]);

  /* ═══ PICK HOME ═══ */
  const pickHome=useCallback(async(comunaId)=>{
    if(!myId)return;
    await sb.from('territories').update({owner_type:'player',owner_id:myId,garrison:STARTING_SOLDIERS}).eq('comuna_id',comunaId);
    setTerritories(prev=>({...prev,[comunaId]:{owner:myId,garrison:STARTING_SOLDIERS}}));
    showToast(`🏰 ¡${getCom(comunaId)?.name} es tu hogar!`);
    setScreen("kingdom");
  },[myId]);

  /* ═══ ATTACK ═══ */
  const startAttack=useCallback((fromId,toId)=>{
    const from=terrRef.current[fromId];
    const to=terrRef.current[toId];
    if(!from||!to||from.owner!==myId)return;

    const ratio=from.garrison/(to.garrison||1);
    const lines=pickNarr(true,ratio); // we pick narr before knowing result for suspense
    const result=combat(from.garrison,to.garrison);

    setBattleState({phase:'narrating',lines,lineIdx:0,result,fromId,toId});
    setScreen("battle");

    battleTimers.current.forEach(clearTimeout);
    battleTimers.current=[];
    for(let i=1;i<lines.length;i++){
      battleTimers.current.push(setTimeout(()=>setBattleState(prev=>({...prev,lineIdx:i})),i*1800));
    }
    battleTimers.current.push(setTimeout(async()=>{
      // Apply result
      const r=result;
      const conquered=r.conquered;
      const cName=getCom(toId)?.name||"";

      if(r.attackerWins){
        if(conquered){
          const moveCount=Math.ceil(r.newAttacker*0.25);
          const stayCount=r.newAttacker-moveCount;
          await sb.from('territories').update({owner_type:'player',owner_id:myId,garrison:moveCount}).eq('comuna_id',toId);
          await sb.from('territories').update({garrison:stayCount}).eq('comuna_id',fromId);
          if(myId)await sb.from('players').update({wins:wins+1}).eq('id',myId);
          setTerritories(prev=>({...prev,
            [toId]:{owner:myId,garrison:moveCount},
            [fromId]:{...prev[fromId],garrison:stayCount}
          }));
          setWins(w=>w+1);
          setBattleLog(l=>[{text:`🏆 ¡Conquistaste ${cName}! (${moveCount} → nueva, ${stayCount} quedan)`,type:"win"},...l.slice(0,29)]);
        }else{
          await sb.from('territories').update({garrison:r.newAttacker}).eq('comuna_id',fromId);
          await sb.from('territories').update({garrison:r.newDefender}).eq('comuna_id',toId);
          if(myId)await sb.from('players').update({wins:wins+1}).eq('id',myId);
          setTerritories(prev=>({...prev,
            [fromId]:{...prev[fromId],garrison:r.newAttacker},
            [toId]:{...prev[toId],garrison:r.newDefender}
          }));
          setWins(w=>w+1);
          setBattleLog(l=>[{text:`⚔️ Victoria en ${cName}! Tú: -${r.attackerLoss}, Ellos: -${r.defenderLoss}`,type:"win"},...l.slice(0,29)]);
        }
      }else{
        await sb.from('territories').update({garrison:r.newAttacker}).eq('comuna_id',fromId);
        await sb.from('territories').update({garrison:r.newDefender}).eq('comuna_id',toId);
        if(myId)await sb.from('players').update({losses:losses+1}).eq('id',myId);
        setTerritories(prev=>({...prev,
          [fromId]:{...prev[fromId],garrison:r.newAttacker},
          [toId]:{...prev[toId],garrison:r.newDefender}
        }));
        setLosses(l=>l+1);
        setBattleLog(l=>[{text:`💀 Derrota en ${cName}. Tú: -${r.attackerLoss}`,type:"lose"},...l.slice(0,29)]);
      }
      setBattleState(prev=>({...prev,phase:'result',lines:pickNarr(r.attackerWins,from.garrison/(to.garrison||1))}));
    },lines.length*1800+500));
  },[myId,wins,losses]);

  // Cleanup battle timers
  useEffect(()=>()=>{battleTimers.current.forEach(clearTimeout);},[]);

  /* ═══ HELPER: get player info ═══ */
  const getPlayerName=(oid)=>allPlayers.find(p=>p.id===oid)?.name||'Bot';
  const getPlayerColor=(oid)=>{
    if(!oid||oid==='npc')return NPC_COLOR;
    if(oid===myId)return C.gold;
    const idx=allPlayers.findIndex(p=>p.id===oid);
    return PLAYER_COLORS[idx%PLAYER_COLORS.length];
  };

  /* ═══════════════════════════════════════════════════
     ZONE 10: SCREENS / UI
     ═══════════════════════════════════════════════════ */
  const shell={minHeight:"100vh",width:"100%",background:`radial-gradient(ellipse at 30% 0%,#1a160f 0%,${C.bg} 70%)`,fontFamily:"'Crimson Text',serif",color:C.txt,paddingTop:"env(safe-area-inset-top,0px)",paddingBottom:"env(safe-area-inset-bottom,0px)"};

  if(loading||screen==="init")return <LoadingScreen msg="Conectando al mundo..."/>;

  /* CATCH UP */
  if(screen==="catchUp"&&catchUpData){
    return(
      <div style={{...shell,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
        <div style={{fontSize:48,marginBottom:12}}>⏩</div>
        <h2 style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:20,marginBottom:8}}>Mientras no estabas...</h2>
        <p style={{color:C.dim,fontSize:14,marginBottom:16}}>Se simularon {catchUpData.turns} turnos</p>
        <div style={{maxHeight:200,overflow:'auto',width:'100%',maxWidth:400,marginBottom:20}}>
          {catchUpData.events.slice(0,10).map((e,i)=><div key={i} style={{padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,0.05)',fontSize:13,color:e.startsWith("⚠️")?C.lose:C.dim}}>{e}</div>)}
        </div>
        <button onClick={()=>{setCatchUpData(null);setScreen(hasStarted?"kingdom":"pickHome");}} style={{background:`linear-gradient(135deg,${C.gold},#a07828)`,borderRadius:14,padding:'14px 40px',color:'#000',fontFamily:"'Cinzel',serif",fontWeight:800,fontSize:15}}>
          Continuar
        </button>
      </div>
    );
  }

  /* PICK HOME */
  if(screen==="pickHome"){
    const npcComunas=Object.entries(territories).filter(([,t])=>t.owner==='npc');
    return(
      <div style={{...shell,padding:20}}>
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:36}}>🏰</div>
          <h2 style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:20}}>Elige tu comuna</h2>
          <p style={{color:C.dim,fontSize:13}}>Toca una comuna gris para establecer tu base</p>
        </div>
        <HexMap territories={territories} myId={myId} allPlayers={allPlayers} selected={selectedComuna} onSelect={id=>{
          if(territories[id]?.owner==='npc')setSelectedComuna(id);
        }}/>
        {selectedComuna&&territories[selectedComuna]?.owner==='npc'&&(
          <div className="fade-in" style={{textAlign:'center',marginTop:12}}>
            <p style={{color:C.gold,fontFamily:"'Cinzel',serif",fontSize:16,marginBottom:8}}>
              {getCom(selectedComuna)?.name}
            </p>
            <button onClick={()=>pickHome(selectedComuna)} style={{background:`linear-gradient(135deg,${C.gold},#a07828)`,borderRadius:12,padding:'12px 32px',color:'#000',fontFamily:"'Cinzel',serif",fontWeight:800,fontSize:14}}>
              🏰 Establecer base aquí
            </button>
          </div>
        )}
      </div>
    );
  }

  /* KINGDOM (main dashboard) */
  if(screen==="kingdom"){
    return(
      <div style={{...shell,padding:'16px 16px 80px'}}>
        {/* Toast */}
        {toast&&<div style={{position:'fixed',top:12,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.9)',border:`1px solid ${C.gold}33`,borderRadius:12,padding:'10px 20px',color:C.gold,fontFamily:"'Cinzel',serif",fontSize:12,zIndex:100,animation:'fadeIn .3s'}}>{toast}</div>}

        {/* Header */}
        <div style={{textAlign:'center',marginBottom:16}}>
          <div style={{fontSize:12,color:C.dim,letterSpacing:2,fontFamily:"'Cinzel',serif"}}>REINO DE</div>
          <div style={{fontSize:20,fontFamily:"'Cinzel',serif",fontWeight:900,color:C.gold}}>{user.name}</div>
          <div style={{fontSize:13,color:C.dim}}>{rank.icon} {rank.name}</div>
        </div>

        {/* Stats row */}
        <div style={{display:'flex',justifyContent:'center',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          {[
            {label:'Soldados',value:totalSoldiers,icon:'⚔️'},
            {label:'Comunas',value:myTerrs.length,icon:'🏰'},
            {label:'+/10min',value:myTerrs.length*prodRate,icon:'💰'},
            {label:'V/D',value:`${wins}/${losses}`,icon:'📊'}
          ].map(s=>(
            <div key={s.label} style={{background:C.card,borderRadius:12,padding:'10px 14px',textAlign:'center',minWidth:70,border:'1px solid rgba(255,255,255,0.05)'}}>
              <div style={{fontSize:18}}>{s.icon}</div>
              <div style={{fontSize:16,fontWeight:700,color:C.gold}}>{s.value}</div>
              <div style={{fontSize:9,color:C.dim,fontFamily:"'Cinzel',serif"}}>{s.label}</div>
            </div>
          ))}
        </div>

        {/* Action buttons */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          <button onClick={()=>setScreen("map")} style={{background:'linear-gradient(135deg,#3b82f6,#1d4ed8)',borderRadius:12,padding:'14px',color:'#fff',fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:13}}>
            🗺️ Mapa
          </button>
          <button onClick={()=>{if(videoReady&&myTerrs.length>0){if(myTerrs.length===1)watchVideo(myTerrs[0][0]);else setScreen("pickVideo");}}} disabled={!videoReady} style={{background:videoReady?'linear-gradient(135deg,#8b5cf6,#6d28d9)':'rgba(255,255,255,0.05)',borderRadius:12,padding:'14px',color:videoReady?'#fff':'rgba(255,255,255,0.3)',fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:13}}>
            {videoReady?`📺 Video (+${VIDEO_BONUS})`:`📺 ${Math.floor(videoWaitSec/60)}:${(videoWaitSec%60).toString().padStart(2,'0')}`}
          </button>
          <button onClick={doManualBotTurn} style={{background:'linear-gradient(135deg,#f59e0b,#d97706)',borderRadius:12,padding:'14px',color:'#000',fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:13}}>
            ⏩ Turno Bot
          </button>
          <button onClick={upgradeProduction} disabled={!canUpgrade||upgrading} style={{background:canUpgrade&&!upgrading?'linear-gradient(135deg,#22c55e,#16a34a)':'rgba(255,255,255,0.05)',borderRadius:12,padding:'14px',color:canUpgrade&&!upgrading?'#fff':'rgba(255,255,255,0.3)',fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:13}}>
            {upgrading?'⏳...':prodRate>=5?`👑 Max ${prodRate}/10m`:`⬆️ ${prodRate}→${prodRate+1}/10m (${nextUpgradeCost})`}
          </button>
        </div>

        {/* My comunas */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:11,color:C.dim,fontFamily:"'Cinzel',serif",letterSpacing:2,marginBottom:6}}>MIS COMUNAS</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {myTerrs.map(([id,t])=>(
              <div key={id} style={{background:C.card,borderRadius:8,padding:'6px 10px',border:`1px solid ${C.gold}22`,fontSize:12}}>
                <span style={{color:C.gold,fontWeight:700}}>{getCom(id)?.name}</span>
                <span style={{color:C.dim,marginLeft:6}}>⚔{t.garrison}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Battle log */}
        <div style={{fontSize:11,color:C.dim,fontFamily:"'Cinzel',serif",letterSpacing:2,marginBottom:6}}>HISTORIAL</div>
        <div style={{maxHeight:200,overflow:'auto'}}>
          {battleLog.map((e,i)=>(
            <div key={i} style={{padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,0.03)',fontSize:12,color:e.type==='win'?C.win:e.type==='lose'?C.lose:C.dim}}>
              {e.text}
            </div>
          ))}
        </div>
      </div>
    );
  }

  /* PICK VIDEO COMUNA */
  if(screen==="pickVideo"){
    return(
      <div style={{...shell,padding:20}}>
        <h2 style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:18,textAlign:'center',marginBottom:16}}>📺 ¿Dónde sumas soldados?</h2>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {myTerrs.map(([id,t])=>(
            <button key={id} onClick={()=>watchVideo(id)} style={{background:C.card,border:`1px solid ${C.gold}33`,borderRadius:12,padding:'14px',color:C.gold,fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:14,textAlign:'left'}}>
              {getCom(id)?.name} — ⚔{t.garrison} (+{VIDEO_BONUS})
            </button>
          ))}
        </div>
        <button onClick={()=>setScreen("kingdom")} style={{marginTop:16,background:'transparent',border:`1px solid ${C.dim}`,borderRadius:12,padding:'10px 24px',color:C.dim,fontFamily:"'Cinzel',serif",fontSize:13,width:'100%'}}>
          ← Volver
        </button>
      </div>
    );
  }

  /* MAP */
  if(screen==="map"){
    const sel=selectedComuna?territories[selectedComuna]:null;
    const selCom=selectedComuna?getCom(selectedComuna):null;
    const isMine=sel?.owner===myId;
    const myAdjSet=new Set();
    myTerrs.forEach(([id])=>getAdj(id).forEach(a=>{if(territories[a]?.owner!==myId)myAdjSet.add(a);}));
    const isAttackable=selectedComuna&&myAdjSet.has(selectedComuna);
    // Find which of my comunas is adjacent to the selected
    const attackFromList=selectedComuna?myTerrs.filter(([id])=>getAdj(id).includes(selectedComuna)):[];

    return(
      <div style={{...shell,padding:'12px 8px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,padding:'0 8px'}}>
          <button onClick={()=>{setScreen("kingdom");setSelectedComuna(null);}} style={{background:'transparent',color:C.gold,fontFamily:"'Cinzel',serif",fontSize:13}}>← Reino</button>
          <span style={{fontFamily:"'Cinzel',serif",color:C.gold,fontSize:14}}>🗺️ Mapa de Santiago</span>
          <div style={{width:40}}/>
        </div>

        <HexMap territories={territories} myId={myId} allPlayers={allPlayers} selected={selectedComuna} onSelect={setSelectedComuna}/>

        {/* Bottom panel */}
        {sel&&selCom&&(
          <div className="fade-in" style={{background:C.card,borderRadius:14,padding:14,margin:'8px 8px 0',border:'1px solid rgba(255,255,255,0.08)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <div>
                <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,color:isMine?C.gold:'#fff',fontSize:15}}>{selCom.name}</div>
                <div style={{fontSize:12,color:C.dim}}>
                  {sel.owner==='npc'?'🤖 Bot':isMine?'🏰 Tu comuna':`👤 ${getPlayerName(sel.owner)}`}
                </div>
              </div>
              <div style={{fontSize:22,fontWeight:700,color:isMine?C.gold:getPlayerColor(sel.owner)}}>⚔{sel.garrison}</div>
            </div>
            {isAttackable&&attackFromList.map(([fId])=>(
              <button key={fId} onClick={()=>startAttack(fId,selectedComuna)} style={{width:'100%',background:'linear-gradient(135deg,#ef4444,#b91c1c)',borderRadius:10,padding:'12px',color:'#fff',fontFamily:"'Cinzel',serif",fontWeight:800,fontSize:14,marginBottom:4}}>
                ⚔️ Atacar desde {getCom(fId)?.name} ({territories[fId]?.garrison})
              </button>
            ))}
            {isMine&&(
              <div style={{fontSize:12,color:C.dim,textAlign:'center'}}>Tu territorio — producción: +{prodRate}/10min</div>
            )}
            {!isMine&&!isAttackable&&(
              <div style={{fontSize:12,color:C.dim,textAlign:'center'}}>No tienes comunas adyacentes para atacar</div>
            )}
          </div>
        )}
      </div>
    );
  }

  /* BATTLE */
  if(screen==="battle"&&battleState){
    const bs=battleState;
    const fromCom=getCom(bs.fromId);
    const toCom=getCom(bs.toId);
    const r=bs.result;
    return(
      <div style={{...shell,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20,textAlign:'center'}}>
        {bs.phase==='narrating'&&(
          <>
            <div style={{fontSize:14,color:C.dim,fontFamily:"'Cinzel',serif",marginBottom:20}}>
              {fromCom?.name} → {toCom?.name}
            </div>
            <div style={{minHeight:120,display:'flex',flexDirection:'column',gap:12,justifyContent:'center'}}>
              {bs.lines.slice(0,bs.lineIdx+1).map((line,i)=>(
                <div key={i} className="fade-in" style={{fontSize:16,color:i===bs.lineIdx?C.gold:C.dim,fontFamily:"'Crimson Text',serif"}}>{line}</div>
              ))}
            </div>
            <div style={{marginTop:20,animation:'pulse 1.5s infinite',color:C.dim,fontSize:12}}>⚔️ Batalla en progreso...</div>
          </>
        )}
        {bs.phase==='result'&&(
          <>
            <div style={{fontSize:48,marginBottom:12}}>{r.attackerWins?(r.conquered?'🏆':'⚔️'):'💀'}</div>
            <h2 style={{fontFamily:"'Cinzel',serif",color:r.attackerWins?C.win:C.lose,fontSize:22,marginBottom:8}}>
              {r.attackerWins?(r.conquered?'¡CONQUISTADO!':'¡VICTORIA!'):'DERROTA'}
            </h2>
            <div style={{background:C.card,borderRadius:14,padding:16,width:'100%',maxWidth:320,marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
                <span style={{color:C.gold}}>Tú</span><span style={{color:C.gold}}>-{r.attackerLoss} → {r.newAttacker}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between'}}>
                <span style={{color:NPC_COLOR}}>Enemigo</span><span style={{color:NPC_COLOR}}>-{r.defenderLoss} → {r.newDefender}</span>
              </div>
              {r.conquered&&(
                <div style={{marginTop:10,padding:8,background:`${C.win}22`,borderRadius:8,color:C.win,fontSize:13}}>
                  25% de tus soldados se mudan a la nueva comuna
                </div>
              )}
            </div>
            <div style={{display:'flex',gap:10}}>
              {r.attackerWins&&!r.conquered&&territories[bs.toId]?.garrison>0&&(
                <button onClick={()=>{setBattleState(null);setSelectedComuna(bs.toId);startAttack(bs.fromId,bs.toId);}} style={{background:'linear-gradient(135deg,#ef4444,#b91c1c)',borderRadius:12,padding:'12px 24px',color:'#fff',fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:13}}>
                  ⚔️ Atacar otra vez
                </button>
              )}
              <button onClick={()=>{setBattleState(null);setScreen("map");}} style={{background:`linear-gradient(135deg,${C.gold},#a07828)`,borderRadius:12,padding:'12px 24px',color:'#000',fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:13}}>
                🗺️ Volver al mapa
              </button>
            </div>
          </>
        )}
      </div>
    );
  }

  return <LoadingScreen msg="Cargando..."/>;
}

ReactDOM.render(<AuthApp/>,document.getElementById('root'));
</script>
</body>
</html>
